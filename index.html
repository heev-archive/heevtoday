<script>
// lucide 안전하게 실행
try{ lucide.createIcons(); }catch(e){}

// ── 🍧 파비콘 흐렸다 밝아지는 효과 ──
(function(){
  const favCanvas = document.createElement('canvas');
  favCanvas.width = favCanvas.height = 64;
  const favCtx = favCanvas.getContext('2d');
  const fav = document.getElementById('favicon');
  let favAlpha = 0, favDir = 1;

  function drawFavicon(){
    favCtx.clearRect(0,0,64,64);
    favCtx.globalAlpha = 0.2 + favAlpha * 0.8;
    favCtx.font = '52px serif';
    favCtx.fillText('🍏', 4, 52);
    fav.href = favCanvas.toDataURL();
    favAlpha += favDir * 0.025;
    if(favAlpha >= 1){ favAlpha=1; favDir=-1; }
    if(favAlpha <= 0){ favAlpha=0; favDir=1; }
    requestAnimationFrame(drawFavicon);
  }
  drawFavicon();
})();

// ── 별 뿌리기 ──
function spawnStars(id, n, cls, color){
  const el=document.getElementById(id); if(!el) return;
  const shapes=['★','✦','☆','✧','✩','⭑'];
  for(let i=0;i<n;i++){
    const s=document.createElement('span');
    s.className=cls; s.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    const sz=Math.floor(Math.random()*12+7);
    const op=(Math.random()*.5+.25).toFixed(2);
    const dur=(Math.random()*3+2).toFixed(1);
    const del=(Math.random()*3).toFixed(1);
    const c=Math.random()<.15?'#c8a84b':color;
    s.style.cssText=`left:${Math.random()*88+2}%;top:${Math.random()*80+8}%;font-size:${sz}px;--sz:${sz}px;--op:${op};--dur:${dur}s;--del:${del}s;color:${c}`;
    el.appendChild(s);
  }
}





// ── 커서 파티클 ──
const particleShapes = ['🩷','✦','★','✿','♡','🌸','⭑'];
let particleThrottle = 0;
document.addEventListener('mousemove', (e) => {
  const now = Date.now();
  if (now - particleThrottle < 50) return;
  particleThrottle = now;
  const p = document.createElement('div');
  p.className = 'cursor-particle';
  p.innerHTML = particleShapes[Math.floor(Math.random() * particleShapes.length)];
  p.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 800);
});

// 터치 파티클 (모바일)
document.addEventListener('touchmove', (e) => {
  const now = Date.now();
  if (now - particleThrottle < 80) return;
  particleThrottle = now;
  const touch = e.touches[0];
  const p = document.createElement('div');
  p.className = 'cursor-particle';
  p.innerHTML = particleShapes[Math.floor(Math.random() * particleShapes.length)];
  p.style.cssText = `left:${touch.clientX}px;top:${touch.clientY}px;`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 800);
});

function typeText(elId,text,delay,cb){
  var el=document.getElementById(elId);if(!el){if(cb)cb();return;}
  var chars=[...text]; // 이모지 포함 유니코드 안전 split
  var i=0;
  function next(){
    if(i<chars.length){el.innerHTML+=chars[i++];setTimeout(next,65);}
    else{if(cb)setTimeout(cb,180);}
  }
  setTimeout(next,delay);
}
typeText('typing-line-1','i ♥🏠',300,function(){typeText('typing-line-2','heev mood <3 <3 <3',0,null);});

// ── BGM 플레이어 ──
let bgmPlaying=false;
const audio=document.getElementById('bgm-audio');
const disc=document.getElementById('bgm-disc');
const btn=document.getElementById('bgm-btn');
const icon=document.getElementById('bgm-icon');
btn.addEventListener('click',()=>{
  if(!audio.src || audio.src===window.location.href){
    alert('BGM 파일을 bgm-audio의 src에 연결해 주세요!'); return;
  }
  if(bgmPlaying){
    audio.pause(); disc.classList.remove('spinning');
    icon.setAttribute('data-lucide','play');
  } else {
    audio.play().catch(()=>{});
    disc.classList.add('spinning');
    icon.setAttribute('data-lucide','pause');
  }
  bgmPlaying=!bgmPlaying;
  lucide.createIcons();
});

// ── 시계: 시:분 ──
function tick(){
  const n=new Date();
  const t=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  var bc=document.getElementById('bar-clock');if(bc)bc.textContent=t;
  var fc=document.getElementById('ft-clock');if(fc)fc.textContent=t;
}
setInterval(tick,1000); tick();
